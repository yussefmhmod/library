<!DOCTYPE html>
<html>
<head>
<title>View Book</title>
<link rel="stylesheet" href="style.css">
<style>
.book-box { padding: 20px; }
.qty-badge {
    display: inline-block;
    background: #333;
    color: #0f0;
    padding: 4px 12px;
    border-radius: 4px;
    font-family: 'Pixel1', monospace;
    margin-bottom: 10px;
}
.unavailable-badge {
    display: inline-block;
    background: #600;
    color: #f88;
    padding: 4px 12px;
    border-radius: 4px;
    font-family: 'Pixel1', monospace;
}
</style>
<script defer src="userVB.js"></script>
</head>
<body background="images/library.png">

<!-- ── Navigation ─────────────────────────────────────────────── -->
<nav class="navClass">
    <hr>
    <table class="navClass" width="100%">
        <caption>navigation bar</caption>
        <thead>
            <tr>
                <td><a href="userNavBar.html"><h2>Home</h2></a></td>
                <td><a href="userBB.html"><h2>My Borrowed Books</h2></a></td>
                <td><a href="userSearch.html"><h2>Search</h2></a></td>
                <td><h2><span id="welcomeMsg">Welcome</span></h2></td>
                <td><a href="#" onclick="logout()"><h2>Sign Out</h2></a></td>
            </tr>
        </thead>
    </table>
    <hr>
</nav>

<!-- ── Logo ──────────────────────────────────────────────────────── -->
<center>
    <img src="images/BookStoreLogo3.png" width="700" alt="Book Store">
</center>

<!-- ── Book Details ──────────────────────────────────────────────── -->
<table border="1" bgcolor="grey" width="100%" cellpadding="20">
<tr>
    <td width="30%" align="center" bgcolor="darkgrey">
        <img id="bookImage" src="" width="300" alt="Book cover">
    </td>
    <td class="book-box">
        <h1 id="title"></h1>
        <h3 id="author"></h3>
        <h3 id="genre"></h3>
        <h3 id="pages"></h3>
        <p  id="description"></p>
        <h3>Status: <span id="status"></span></h3>
        <!-- Copies remaining -->
        <p><span id="quantity" class="qty-badge">Loading…</span></p>

        <!--
            BORROW button only. Return is handled on "My Borrowed Books" page.
            Button state is managed by userVB.js based on availability + user_borrowed.
        -->
        <button id="borrowBtn" onclick="borrowBook()">Borrow Book</button>

        <br><br>
        <a href="userBB.html">← Go to My Borrowed Books to return a book</a>
    </td>
</tr>
</table>

</body>
</html>
