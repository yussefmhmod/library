  <font color="lightgrey "><h2>Add Book to Library</h2> </font>

  <br>

  
<audio id="s" src="sounds/buttonclick.mp3"></audio>
<form class="signupClass" action="" id="addForm">
    <br>
    


    <input type="text" id="bname" required placeholder="Book Name">


    <input type="text" id="bprice" required placeholder="Book Price">


    <input type="text" id="author" required placeholder="Author Name">
    <input type="text" id="image" placeholder="enter image path">

    Category:  <br>
    <select id="catigory" required>
        <option value="fiction">Fiction</option>
        <option value="science">Science</option>
        <option value="history">History</option>
    </select> <br><br>


    <textarea id="desc" rows="4" cols="30" placeholder=" Description"></textarea> <br><br>

    <button type="submit">Add Book</button>
    <input type="reset" value="Clear">
</form>
